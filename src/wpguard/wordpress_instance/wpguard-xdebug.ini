; WPGuard Sandbox — Xdebug function tracing for deep data-flow analysis.
;
; Captures INTERNAL PHP function calls (move_uploaded_file, unserialize,
; file_put_contents, preg_replace, etc.) with arguments — the calls that
; WordPress-hook-level tracing (wpguard-sink-trace.php) cannot see.
;
; mode=trace + start_with_request=trigger => a request is traced ONLY when it
; carries the trigger (GET/POST/COOKIE `XDEBUG_TRACE`), so untriggered audit
; traffic is unaffected and no Apache restart is ever needed to toggle it.
; The wpguard_sink_trace MCP tool adds the trigger to the PoC request and reads
; the resulting trace file.
;
; Traces are written to /var/log/wpguard/trace.<pid>.xt (human-readable).

xdebug.mode = trace
xdebug.start_with_request = trigger
xdebug.trigger_value = wpguard
xdebug.output_dir = /var/log/wpguard
xdebug.trace_output_name = trace.%p
xdebug.use_compression = 0
xdebug.collect_return = 1
xdebug.collect_assignments = 0
; Keep step-debugging off (no IDE attached in the sandbox).
xdebug.log_level = 0
