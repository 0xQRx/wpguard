# WPGuard Sandbox — PHP execution handler matching a STANDARD mod_php host.
#
# Mirrors the Debian/Ubuntu libapache2-mod-php default
# (/etc/apache2/mods-available/php*.conf): on a standard WordPress host ONLY
# .php, .phar and .phtml are executed as PHP.
#
# Do NOT map exotic extensions (.phtm .phps .pht .php2-9 .php6). Standard Apache
# does NOT execute them — .phps is served as syntax-highlighted SOURCE, the rest
# as static content. Mapping them here manufactures FALSE-POSITIVE
# "arbitrary file upload -> RCE" findings that Wordfence rejects (e.g. the .phps
# and .phtm reports on Drag-and-Drop Multiple File Upload for CF7). A real
# file-upload RCE must bypass the plugin's denylist with an extension in THIS
# set. See project memory: sandbox-phtm-false-rce.
<FilesMatch "\.ph(ar|p|tml)$">
    SetHandler application/x-httpd-php
</FilesMatch>
