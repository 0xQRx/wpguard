# WPGuard Sandbox — handle alternate PHP extensions for file upload bypass testing
# WARNING: Most real-world hosts only process .php — this is NON-STANDARD
# Findings that rely on alternate extensions MUST note this in prerequisites
<FilesMatch "\.ph(p[2-9]?|t|tml?|ar|ps)$">
    SetHandler application/x-httpd-php
</FilesMatch>
