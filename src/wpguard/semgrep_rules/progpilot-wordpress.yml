# Progpilot configuration for WordPress security analysis
# Format: https://github.com/designsecurity/progpilot

inputs:
  sources:
    keep_defaults: true
    config_files:
      - /tmp/progpilot-wp-sources.json
  sinks:
    keep_defaults: true
    config_files:
      - /tmp/progpilot-wp-sinks.json
  sanitizers:
    keep_defaults: true
    config_files:
      - /tmp/progpilot-wp-sanitizers.json

outputs:
  tainted_flow: true

options:
  analyze_includes: false
  pretty_print: true
